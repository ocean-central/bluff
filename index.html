<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>bluff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="page">
    <section id="setup" class="panel">
      <h1>bluff</h1>
      <div class="controls">
        <label for="botCount">bots</label>
        <input id="botCount" type="range" min="1" max="3" value="1">
        <div class="range-labels"><span>1</span><span>3</span></div>
        <label for="cardsPerPlayer">cards</label>
        <select id="cardsPerPlayer">
          <option value="5">5</option>
          <option value="7">7</option>
          <option value="10">10</option>
          <option value="auto">auto</option>
        </select>
        <button id="startBtn">start</button>
      </div>
    </section>

    <section id="game" class="panel hidden">
      <div class="board">
        <div id="centerPile" class="center-pile">center</div>
        <div id="players" class="player-list"></div>
      </div>
      <div id="humanHand" class="hand"></div>
      <div id="actionBar" class="action-bar hidden">
        <button id="playBtn" disabled>play</button>
        <button id="passBtn">pass</button>
      </div>
      <div id="log" class="log"></div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
